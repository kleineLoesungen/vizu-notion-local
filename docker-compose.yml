services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config:ro
      # Persistent share-link token store (shares.json). On first run: mkdir -p ./data && chmod 777 ./data
      - ./data:/app/data:rw
    environment:
      NODE_ENV: production
      # Nuxt reads runtimeConfig overrides via NUXT_<KEY> at runtime (not NOTION_API_TOKEN directly)
      NUXT_NOTION_API_TOKEN: ${NOTION_API_TOKEN}
    env_file:
      - .env
    restart: unless-stopped
