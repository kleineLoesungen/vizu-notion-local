version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config:ro
      # Persistent share-link token store. On first run: mkdir -p ./data/shares && chmod 777 ./data/shares
      - ./data:/app/data:rw
    environment:
      NODE_ENV: production
      NOTION_API_TOKEN: ${NOTION_API_TOKEN}
    env_file:
      - .env
    restart: unless-stopped
