<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- White background rounded square -->
  <rect width="32" height="32" rx="6" fill="#ffffff"/>

  <!-- Blue line (horizontal, main) -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Indigo line (diagonal, top-left to bottom-right) -->
  <line x1="4" y1="8" x2="28" y2="24" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Slate line (diagonal, top-right to bottom-left) -->
  <line x1="4" y1="24" x2="28" y2="8" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Station dots at intersections / endpoints -->
  <!-- Blue line endpoints -->
  <circle cx="4" cy="16" r="3" fill="#2563eb"/>
  <circle cx="28" cy="16" r="3" fill="#2563eb"/>

  <!-- Indigo line endpoints -->
  <circle cx="4" cy="8" r="3" fill="#4338ca"/>
  <circle cx="28" cy="24" r="3" fill="#4338ca"/>

  <!-- Slate line endpoints -->
  <circle cx="4" cy="24" r="3" fill="#64748b"/>
  <circle cx="28" cy="8" r="3" fill="#64748b"/>

  <!-- Center intersection (all three lines cross near center) — white dot for clarity -->
  <circle cx="16" cy="16" r="3.5" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Blue/indigo intersection (approx) -->
  <circle cx="11" cy="12" r="2.5" fill="#ffffff" stroke="#4338ca" stroke-width="1.5"/>

  <!-- Blue/slate intersection (approx) -->
  <circle cx="21" cy="12" r="2.5" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
</svg>
